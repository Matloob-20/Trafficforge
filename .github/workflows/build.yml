name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install pyinstaller playwright

      - name: Inject New_traffic.py as base64 into launcher
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("New_traffic.py")
          $b64 = [System.Convert]::ToBase64String($bytes)

          $launcher = Get-Content -Path "launcher.py" -Raw -Encoding UTF8
          $launcher = $launcher -replace '"__MAIN_PY_B64_PLACEHOLDER__"', ('"' + $b64 + '"')

          [System.IO.File]::WriteAllText("launcher_build.py", $launcher, [System.Text.Encoding]::UTF8)
          Write-Host "Base64 injection complete"

          $verify = Get-Content "launcher_build.py" -Raw
          if ($verify -match 'MAIN_PY_B64 = "[A-Za-z0-9+/]') {
              Write-Host "Verification OK"
          } else {
              Write-Error "Injection FAILED"
              exit 1
          }

      - name: Download portable Python 3.11
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "portable_python"

          # Enable site-packages in the embedded distribution
          $pth = Get-ChildItem "portable_python" -Filter "python*._pth" | Select-Object -First 1
          (Get-Content $pth.FullName) -replace "#import site","import site" | Set-Content $pth.FullName

          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          & "portable_python\python.exe" "get-pip.py" --no-warn-script-location
          & "portable_python\python.exe" -m pip install PyQt5 playwright PySocks requests --no-warn-script-location
          & "portable_python\python.exe" -c "import PyQt5, playwright, socks; print('All packages OK')"

      - name: Install Playwright Chromium and bundle it
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\bundled_browsers"
          python -m playwright install chromium

          $chrome = Get-ChildItem -Recurse -Filter "chrome.exe" "bundled_browsers" | Select-Object -First 1
          if ($chrome) {
              Write-Host "Chromium bundled at: $($chrome.FullName)"
          } else {
              Write-Error "Chromium download FAILED"
              exit 1
          }

      - name: Build launcher EXE
        run: pyinstaller --onefile --windowed --name="TrafficForge" --hidden-import=base64 --hidden-import=ctypes launcher_build.py

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          # Detect the chromium folder name (e.g. "chromium-1234")
          $chromiumFolder = Get-ChildItem "bundled_browsers" -Directory | Where-Object { $_.Name -like "chromium-*" } | Select-Object -First 1
          $chromiumName = $chromiumFolder.Name
          Write-Host "Chromium folder: $chromiumName"

          $nsis = @"
          !include "MUI2.nsh"

          ; ── LZMA solid compression: cuts installer size ~25% ──
          SetCompressor /SOLID lzma
          SetCompressorDictSize 64

          Name "TrafficForge v4.0"
          OutFile "TrafficForge_Setup.exe"
          InstallDir "`$PROGRAMFILES\TrafficForge"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "dist\TrafficForge.exe"

            ; Portable Python — runs the app
            SetOutPath "`$INSTDIR\portable_python"
            File /r "portable_python\*.*"

            ; Bundled Chromium — no internet needed on client
            SetOutPath "`$INSTDIR\ms-playwright\$chromiumName"
            File /r "bundled_browsers\$chromiumName\*.*"

            CreateShortcut "`$DESKTOP\TrafficForge.lnk" "`$INSTDIR\TrafficForge.exe"
            CreateShortcut "`$SMPROGRAMS\TrafficForge.lnk" "`$INSTDIR\TrafficForge.exe"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TrafficForge" "DisplayName" "TrafficForge v4.0"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TrafficForge" "UninstallString" "`$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\TrafficForge.lnk"
            Delete "`$SMPROGRAMS\TrafficForge.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TrafficForge"
          SectionEnd
          "@
          $nsis | Out-File -FilePath installer.nsi -Encoding UTF8
          Write-Host "NSIS script created"

      - name: Build installer
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          makensis installer.nsi
          Write-Host "Installer built successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrafficForge-Setup
          path: TrafficForge_Setup.exe