name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install pyinstaller

      - name: Build Launcher EXE
        run: |
          pyinstaller --onefile --windowed ^
            --name="TrafficForge" ^
            --hidden-import=tkinter ^
            --hidden-import=tkinter.ttk ^
            launcher.py

      - name: Package with main.py
        run: |
          mkdir release
          copy dist\TrafficForge.exe release\TrafficForge.exe
          copy main.py release\main.py

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: TrafficForge-Windows
          path: release\